<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mail Center</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
      <li><a href="admin-dashboard.html">Dashboard</a></li>
      <li><a href="admin-edit-account.html">Edit Account</a></li>
      <li><a href="admin-events.html">Events</a></li>
      <li><a href="admin-student.html">Student Management</a></li>
      <li><a href="admin-management.html">Admin Management</a></li>
      <li><a href="admin-reports.html">Reports</a></li>
      <li><a href="admin-audit.html">Audit Trail</a></li>
      <li><a href="admin-backup.html">System Backup</a></li>
      <li><a href="admin-blog.html">Blog</a></li>
      <li><a href="admin-mail.html" class="active">Mail</a></li>
    </ul>
  </div>

  <div class="main">
    <header>
      <h1>Mail Center</h1>
    </header>

    <section class="content">
      <h2>Compose Message</h2>
      <form class="mail-form">
        <label>Recipient</label>
        <select>
          <option value="all">All Users</option>
          <option value="active">Active Users</option>
          <option value="admins">Admins Only</option>
          <option value="specific">Specific User (enter below)</option>
        </select>

        <input type="text" placeholder="Enter recipient email (optional)">

        <label>Subject</label>
        <input type="text" placeholder="Enter subject" required>

        <label>Message</label>
        <textarea rows="5" placeholder="Type your message..." required></textarea>

        <button type="submit">Send</button>
      </form>

      <h2>Sent Messages</h2>
      <table>
        <thead>
          <tr>
            <th>Subject</th>
            <th>Date Sent</th>
            <th>Recipients</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Upcoming CodeDuel Challenge</td>
            <td>2025-10-10</td>
            <td>All Users</td>
          </tr>
        </tbody>
      </table>
    </section>
  </div>
</body>
</html>
