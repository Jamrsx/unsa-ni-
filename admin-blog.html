<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog Management</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="sidebar">
    <h2>Admin Panel</h2>
    <ul>
      <li><a href="admin-dashboard.html">Dashboard</a></li>
      <li><a href="admin-edit-account.html">Edit Account</a></li>
      <li><a href="admin-events.html">Events</a></li>
      <li><a href="admin-student.html">Student Management</a></li>
      <li><a href="admin-management.html">Admin Management</a></li>
      <li><a href="admin-reports.html">Reports</a></li>
      <li><a href="admin-audit.html">Audit Trail</a></li>
      <li><a href="admin-backup.html">System Backup</a></li>
      <li><a href="admin-blog.html" class="active">Blog</a></li>
      <li><a href="admin-mail.html">Mail</a></li>
    </ul>
  </div>

  <div class="main">
    <header>
      <h1>Blog Management</h1>
    </header>

    <section class="content">
      <h2>Create New Blog</h2>
      <form class="blog-form">
        <label>Title</label>
        <input type="text" placeholder="Enter blog title" required>

        <label>Content</label>
        <textarea placeholder="Write your blog post..." rows="6" required></textarea>

        <label>Upload Image (optional)</label>
        <input type="file" accept="image/*">

        <button type="submit">Publish Blog</button>
      </form>

      <h2>Published Blogs</h2>
      <table>
        <thead>
          <tr>
            <th>Title</th>
            <th>Date Published</th>
            <th>Author</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Welcome to CodeDuel!</td>
            <td>2025-10-10</td>
            <td>Admin Paul</td>
            <td>
              <button>Edit</button>
              <button class="danger">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </div>
</body>
</html>
