<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Duel History | CodeDuel</title>
</head>
<body>
  <header>
    <h1>CodeDuel</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Single</a>
      <a href="#">Duel</a>
      <a href="#">Leaderboards</a>
    </nav>
    <div class="settings">
      <button>*cog wheel*</button>
    </div>
  </header>

  <main>
    <aside>
      <ul>
        <li><a href="user-account.html">My account</a></li>
        <li><a href="user-edit-account.html">Edit account</a></li>
        <li><a href="user-duel-history.html">Duel History</a></li>
        <li><a href="user-mail.html">Mail</a></li>
      </ul>
      <button>Log out</button>
    </aside>

    <section class="match-history">
      <h2>Match History</h2>

      <div class="match-list">
        <div class="match">
          <div class="player">
            <img src="https://via.placeholder.com/50" alt="Player 1">
            <span>Username</span>
          </div>
          <div class="vs">VS</div>
          <div class="player">
            <img src="https://via.placeholder.com/50" alt="Player 2">
            <span>Username</span>
          </div>
          <div class="match-info">
            <p>Match Result: LOSS</p>
            <p>Match Duration: 09:10</p>
            <p>Date: 12/06/25</p>
          </div>
        </div>

        <div class="match">
          <div class="player">
            <img src="https://via.placeholder.com/50" alt="Player 1">
            <span>Username</span>
          </div>
          <div class="vs">VS</div>
          <div class="player">
            <img src="https://via.placeholder.com/50" alt="Player 2">
            <span>Username</span>
          </div>
          <div class="match-info">
            <p>Match Result: WON</p>
            <p>Match Duration: 05:30</p>
            <p>Date: 12/05/25</p>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
